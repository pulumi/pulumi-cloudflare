name: example-list
runtime: yaml

config:
  cloudflare-account-id:
    type: string

resources:
  redirect-list:
    type: cloudflare:List
    properties:
      accountId: ${cloudflare-account-id}
      name: pulumi_cloudflare_test_redirects
      kind: redirect
      items:
        - comment: pulumi_cloudflare_test_1
          value:
            redirects:
              - sourceUrl: example.com/old-page
                targetUrl: https://example.com/new-page
                statusCode: 301
        - comment: pulumi_cloudflare_test_2
          value:
            redirects:
              - sourceUrl: example.com/another-old
                targetUrl: https://example.com/another-new
                statusCode: 301
