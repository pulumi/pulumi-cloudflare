name: example-ruleset-headers
runtime: yaml

config:
  cloudflare-zone-id:
    type: string

resources:
  headers-ruleset:
    type: cloudflare:Ruleset
    properties:
      name: pulumi_cloudflare_test_headers
      kind: zone
      zoneId: ${cloudflare-zone-id}
      phase: http_request_late_transform
      rules:
        - action: rewrite
          actionParameters:
            headers:
              X-Pulumi-Test-Set:
                operation: set
                value: hello
              X-Pulumi-Test-Remove:
                operation: remove
          enabled: true
          expression: '(http.host eq "example.com")'
